services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: reach
      POSTGRES_PASSWORD: reach
      POSTGRES_DB: reach
    ports:
      - "5432:5432"
    volumes:
      - reach_pg:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  reach_pg:
